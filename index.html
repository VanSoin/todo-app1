<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Todo App</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="container">
      <h1>Todo List</h1>
      <!-- theme switch button -->
      <button id="theme-toggle" type="button" aria-label="Toggle dark/light theme">🌙</button>

      <form id="todo-form" class="todo-form" action="#" onsubmit="return false;">
        <input id="todo-input" type="text" placeholder="Add a todo..." aria-label="Add todo" />
        <button id="add-btn" type="button">Add</button>
      </form>

      <ul id="todo-list" class="todo-list" aria-live="polite"></ul>
    </main>

    <script src="app.js"></script>
  </body>
</html>
